name: Deploy to Staging

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [staging]

permissions:
  contents: read

concurrency:
  group: stargate-staging-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Railway Staging
    runs-on: ubuntu-latest
    environment: staging
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Verify CI passed
        if: ${{ github.event.workflow_run.conclusion != 'success' }}
        run: |
          echo "CI did not pass. Aborting deploy."
          exit 1

      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install verification dependencies
        run: pip install requests

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Preflight staging environment
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
          RAILWAY_SERVICE_NAME: ${{ vars.RAILWAY_SERVICE_NAME }}
          RAILWAY_STAGING_ENVIRONMENT: ${{ vars.RAILWAY_STAGING_ENVIRONMENT }}
        run: |
          SERVICE_NAME="${RAILWAY_SERVICE_NAME:-stargate-lite}"
          STAGING_ENV="${RAILWAY_STAGING_ENVIRONMENT:-staging}"
          python scripts/check_railway_readiness.py \
            --environment "$STAGING_ENV" \
            --service "$SERVICE_NAME" \
            --expect-env-value staging

      - name: Deploy to staging
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
          RAILWAY_SERVICE_NAME: ${{ vars.RAILWAY_SERVICE_NAME }}
          RAILWAY_STAGING_ENVIRONMENT: ${{ vars.RAILWAY_STAGING_ENVIRONMENT }}
        run: |
          SERVICE_NAME="${RAILWAY_SERVICE_NAME:-stargate-lite}"
          STAGING_ENV="${RAILWAY_STAGING_ENVIRONMENT:-staging}"
          for attempt in 1 2 3; do
            if railway up --ci --service "$SERVICE_NAME" --environment "$STAGING_ENV"; then
              exit 0
            fi
            echo "Railway staging deploy attempt $attempt failed, retrying..."
            sleep $((attempt * 20))
          done
          echo "Railway staging deploy failed after retries"
          exit 1

      - name: Verify staging API
        env:
          STAGING_URL: ${{ vars.STAGING_URL }}
          STAGING_API_KEY: ${{ secrets.STAGING_API_KEY }}
          STAGING_MIN_CAPABILITIES: ${{ vars.STAGING_MIN_CAPABILITIES }}
        run: |
          MIN_CAPS="${STAGING_MIN_CAPABILITIES:-100}"
          for attempt in 1 2 3 4 5; do
            if python scripts/verify_remote_api.py \
              --base-url "$STAGING_URL" \
              --api-key "$STAGING_API_KEY" \
              --min-capabilities "$MIN_CAPS"; then
              exit 0
            fi
            echo "Staging verification attempt $attempt failed, retrying..."
            sleep 15
          done
          echo "Staging verification failed after retries"
          exit 1
