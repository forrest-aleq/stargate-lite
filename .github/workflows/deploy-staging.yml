name: Deploy to Staging

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [staging]

permissions:
  contents: read

concurrency:
  group: stargate-staging-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Railway Staging
    runs-on: ubuntu-latest
    environment: staging
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Verify CI passed
        if: ${{ github.event.workflow_run.conclusion != 'success' }}
        run: |
          echo "CI did not pass. Aborting deploy."
          exit 1

      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install verification dependencies
        run: pip install requests

      - name: Install Railway CLI
        run: npm install -g @railway/cli@4.58.0

      - name: Check Railway staging readiness
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
          SERVICE_NAME: ${{ vars.RAILWAY_SERVICE_NAME }}
          STAGING_ENV: ${{ vars.RAILWAY_STAGING_ENVIRONMENT }}
        run: |
          set -euo pipefail
          python scripts/check_railway_readiness.py \
            --environment "$STAGING_ENV" \
            --service "$SERVICE_NAME" \
            --expect-env-value staging

      - name: Deploy to Railway staging
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
          SERVICE_NAME: ${{ vars.RAILWAY_SERVICE_NAME }}
          STAGING_ENV: ${{ vars.RAILWAY_STAGING_ENVIRONMENT }}
          SOURCE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          for name in RAILWAY_TOKEN SERVICE_NAME STAGING_ENV SOURCE_SHA; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required for Railway deploys."
              exit 1
            fi
          done
          retry_railway() {
            local attempt
            local delay=15
            local max_attempts=5
            for attempt in $(seq 1 "$max_attempts"); do
              if railway "$@"; then
                return 0
              fi
              local status="$?"
              if [ "$attempt" -eq "$max_attempts" ]; then
                return "$status"
              fi
              echo "Railway command failed on attempt ${attempt}/${max_attempts}; retrying in ${delay}s."
              sleep "$delay"
              delay=$((delay * 2))
            done
          }
          BUILD_TIME="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          retry_railway variable set \
            --service "$SERVICE_NAME" \
            --environment "$STAGING_ENV" \
            --skip-deploys \
            "STARGATE_BUILD_SHA=${SOURCE_SHA}" \
            "STARGATE_BUILD_TIME=${BUILD_TIME}" \
            "STARGATE_DEPLOYMENT_ID=${GITHUB_RUN_ID}" \
            "STARGATE_ENVIRONMENT=staging" \
            "ENVIRONMENT=staging"
          retry_railway up --ci --service "$SERVICE_NAME" --environment "$STAGING_ENV"

      - name: Verify staging API
        env:
          STAGING_URL: ${{ vars.STAGING_URL }}
          STAGING_API_KEY: ${{ secrets.STAGING_API_KEY }}
          STAGING_MIN_CAPABILITIES: ${{ vars.STAGING_MIN_CAPABILITIES }}
        run: |
          MIN_CAPS="${STAGING_MIN_CAPABILITIES:-100}"
          for attempt in 1 2 3 4 5; do
            if python scripts/verify_remote_api.py \
              --base-url "$STAGING_URL" \
              --api-key "$STAGING_API_KEY" \
              --expected-sha "${{ github.event.workflow_run.head_sha }}" \
              --min-capabilities "$MIN_CAPS"; then
              exit 0
            fi
            echo "Staging verification attempt $attempt failed, retrying..."
            sleep 15
          done
          echo "Staging verification failed after retries"
          exit 1
