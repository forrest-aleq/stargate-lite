name: Deploy to Staging

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [staging]

permissions:
  contents: read
  id-token: write

concurrency:
  group: stargate-staging-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloud Run Staging
    runs-on: ubuntu-latest
    environment: staging
    if: ${{ github.event.workflow_run.conclusion == 'success' && vars.ENABLE_CLOUD_RUN_DEPLOY == 'true' }}
    steps:
      - name: Verify CI passed
        if: ${{ github.event.workflow_run.conclusion != 'success' }}
        run: |
          echo "CI did not pass. Aborting deploy."
          exit 1

      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install verification dependencies
        run: pip install requests

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - id: image
        name: Build and push image
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          REGISTRY_LOCATION: ${{ vars.GCP_ARTIFACT_REGISTRY_LOCATION }}
          REPOSITORY: ${{ vars.GCP_ARTIFACT_REGISTRY_REPOSITORY }}
        run: |
          set -euo pipefail
          for name in PROJECT_ID REGISTRY_LOCATION REPOSITORY; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required for Cloud Run deploys."
              exit 1
            fi
          done
          SOURCE_SHA="${{ github.event.workflow_run.head_sha }}"
          REGISTRY_HOST="${REGISTRY_LOCATION}-docker.pkg.dev"
          IMAGE_URI="${REGISTRY_HOST}/${PROJECT_ID}/${REPOSITORY}/stargate-lite:${SOURCE_SHA}"
          gcloud auth configure-docker "$REGISTRY_HOST" --quiet
          docker build --tag "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"
          echo "source_sha=$SOURCE_SHA" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        env:
          IMAGE_URI: ${{ steps.image.outputs.image_uri }}
          SOURCE_SHA: ${{ steps.image.outputs.source_sha }}
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          REGION: ${{ vars.GCP_REGION }}
          SERVICE_NAME: ${{ vars.GCP_CLOUD_RUN_SERVICE }}
          EXTRA_ENV_VARS: ${{ vars.GCP_CLOUD_RUN_ENV_VARS }}
          SECRET_MAPPINGS: ${{ vars.GCP_CLOUD_RUN_SECRETS }}
        run: |
          set -euo pipefail
          for name in IMAGE_URI SOURCE_SHA PROJECT_ID REGION SERVICE_NAME SECRET_MAPPINGS; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required for Cloud Run deploys."
              exit 1
            fi
          done
          BUILD_TIME="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          RUNTIME_ENV="STARGATE_BUILD_SHA=${SOURCE_SHA},STARGATE_BUILD_TIME=${BUILD_TIME},STARGATE_DEPLOYMENT_ID=${GITHUB_RUN_ID},STARGATE_ENVIRONMENT=staging,ENVIRONMENT=staging"
          if [ -n "${EXTRA_ENV_VARS:-}" ]; then
            RUNTIME_ENV="${RUNTIME_ENV},${EXTRA_ENV_VARS}"
          fi
          gcloud run deploy "$SERVICE_NAME" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --platform managed \
            --image "$IMAGE_URI" \
            --allow-unauthenticated \
            --update-env-vars "$RUNTIME_ENV" \
            --set-secrets "$SECRET_MAPPINGS" \
            --quiet

      - name: Verify staging API
        env:
          STAGING_URL: ${{ vars.STAGING_URL }}
          STAGING_API_KEY: ${{ secrets.STAGING_API_KEY }}
          STAGING_MIN_CAPABILITIES: ${{ vars.STAGING_MIN_CAPABILITIES }}
        run: |
          MIN_CAPS="${STAGING_MIN_CAPABILITIES:-100}"
          for attempt in 1 2 3 4 5; do
            if python scripts/verify_remote_api.py \
              --base-url "$STAGING_URL" \
              --api-key "$STAGING_API_KEY" \
              --expected-sha "${{ github.event.workflow_run.head_sha }}" \
              --min-capabilities "$MIN_CAPS"; then
              exit 0
            fi
            echo "Staging verification attempt $attempt failed, retrying..."
            sleep 15
          done
          echo "Staging verification failed after retries"
          exit 1
