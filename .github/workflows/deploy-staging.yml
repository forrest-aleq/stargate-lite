name: Deploy to Staging

on:
  push:
    branches: [staging]

jobs:
  deploy:
    name: Deploy to Railway Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Staging
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
        run: railway up --service stargate-staging

      - name: Wait for deployment
        run: sleep 30

      - name: Health check
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" ${{ vars.STAGING_URL }}/health)
          if [ "$response" != "200" ]; then
            echo "Health check failed with status $response"
            exit 1
          fi
          echo "Staging health check passed"

      - name: Smoke test
        env:
          API_KEY: ${{ secrets.STAGING_API_KEY }}
        run: |
          response=$(curl -s -H "X-API-Key: $API_KEY" ${{ vars.STAGING_URL }}/api/v1/capabilities)
          count=$(echo $response | jq '.count')
          if [ "$count" -lt 500 ]; then
            echo "Expected 500+ capabilities, got $count"
            exit 1
          fi
          echo "Smoke test passed: $count capabilities"
