name: Promote Staging to Main

on:
  workflow_dispatch:
    inputs:
      skip_staging_smoke:
        description: "Skip live staging smoke check"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: stargate-staging-promotion
  cancel-in-progress: false

jobs:
  gate:
    name: Promotion Gate
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v5
        with:
          ref: staging
          fetch-depth: 0

      - name: Release provenance gate
        run: |
          python3 scripts/release_gate.py \
            --mode promotion \
            --target-ref HEAD \
            --write-proof release-proof/stargate-lite-promotion.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install verification dependencies
        if: ${{ github.event.inputs.skip_staging_smoke != 'true' }}
        run: pip install requests

      - name: Verify staging API
        if: ${{ github.event.inputs.skip_staging_smoke != 'true' }}
        env:
          STAGING_URL: ${{ vars.STAGING_URL }}
          STAGING_API_KEY: ${{ secrets.STAGING_API_KEY }}
          STAGING_MIN_CAPABILITIES: ${{ vars.STAGING_MIN_CAPABILITIES }}
        run: |
          if [ -z "${STAGING_URL:-}" ] || [ -z "${STAGING_API_KEY:-}" ]; then
            echo "::warning::Skipping staging smoke: STAGING_URL/STAGING_API_KEY not configured."
            exit 0
          fi
          MIN_CAPS="${STAGING_MIN_CAPABILITIES:-100}"
          python scripts/verify_remote_api.py \
            --base-url "$STAGING_URL" \
            --api-key "$STAGING_API_KEY" \
            --min-capabilities "$MIN_CAPS"

  open-pr:
    name: Open Promotion PR
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Open or reuse staging-to-main PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PROMOTION_BRANCH="promotion/staging-to-main"
          git fetch origin main staging
          git fetch origin "+refs/heads/${PROMOTION_BRANCH}:refs/remotes/origin/${PROMOTION_BRANCH}" || true
          MAIN_TREE=$(git rev-parse origin/main^{tree})
          STAGING_TREE=$(git rev-parse origin/staging^{tree})
          if [ "$MAIN_TREE" = "$STAGING_TREE" ]; then
            echo "origin/main already has the origin/staging tree"
            exit 0
          fi

          if ! git merge-base --is-ancestor origin/main origin/staging; then
            echo "::error::origin/staging does not contain origin/main. Merge main into staging, redeploy staging, and rerun promotion."
            exit 1
          fi

          STAGING_SHA=$(git rev-parse origin/staging)
          MAIN_SHA=$(git rev-parse origin/main)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$PROMOTION_BRANCH" origin/main
          git read-tree --reset -u origin/staging
          git commit \
            -m "Promote Stargate Lite staging to main" \
            -m "Staging-SHA: ${STAGING_SHA}" \
            -m "Main-SHA: ${MAIN_SHA}"

          PROMOTION_TREE=$(git rev-parse HEAD^{tree})
          if [ "$PROMOTION_TREE" != "$STAGING_TREE" ]; then
            echo "::error::promotion branch tree does not match origin/staging"
            exit 1
          fi

          git push --force-with-lease origin "$PROMOTION_BRANCH:$PROMOTION_BRANCH"

          PR_NUMBER=$(
            gh pr list \
              --base main \
              --head "$PROMOTION_BRANCH" \
              --state open \
              --json number \
              --jq '.[0].number // empty'
          )
          if [ -n "$PR_NUMBER" ]; then
            echo "Promotion PR already exists: #${PR_NUMBER}"
            gh workflow run ci.yml --ref "$PROMOTION_BRANCH"
            exit 0
          fi

          gh pr create \
            --base main \
            --head "$PROMOTION_BRANCH" \
            --title "Promote Stargate Lite staging to main" \
            --body "## Staging to Main Promotion

          This PR promotes the proven Stargate Lite staging tree to main after the release provenance gate passed.

          ### Verification
          - Release provenance gate passed
          - origin/main content is represented in origin/staging history
          - promotion branch is based on origin/main
          - promotion commit tree matches origin/staging
          - staging API smoke passed or was explicitly skipped

          ### Release Control
          Production deploys are separately blocked unless the deploy target is contained in origin/main and matches staged content."
          gh workflow run ci.yml --ref "$PROMOTION_BRANCH"
