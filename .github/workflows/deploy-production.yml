name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref to deploy (branch/tag/SHA)"
        required: false
        default: "main"
      confirm:
        description: 'Type "deploy-production" to confirm'
        required: true
      min_capabilities:
        description: "Minimum capabilities expected after deploy"
        required: false
        default: "100"

permissions:
  contents: read

concurrency:
  group: stargate-production-deploy
  cancel-in-progress: false

jobs:
  provenance:
    name: Release Provenance Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.git_ref }}
          fetch-depth: 0

      - name: Confirm manual deployment
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy-production" ]; then
            echo "Deployment not confirmed"
            exit 1
          fi

      - name: Ensure target ref is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "Target ref is not on main; refusing production deploy"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Release provenance gate
        run: |
          python3 scripts/release_gate.py \
            --mode production \
            --target-ref HEAD \
            --write-proof release-proof/stargate-lite-production.json

  staging-preflight:
    name: Staging Preflight
    needs: provenance
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.git_ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install verification dependencies
        run: pip install requests

      - name: Install Railway CLI
        run: npm install -g @railway/cli@4.58.0

      - name: Check Railway staging readiness
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
          SERVICE_NAME: ${{ vars.RAILWAY_SERVICE_NAME }}
          STAGING_ENV: ${{ vars.RAILWAY_STAGING_ENVIRONMENT }}
        run: |
          python scripts/check_railway_readiness.py \
            --environment "$STAGING_ENV" \
            --service "$SERVICE_NAME" \
            --expect-env-value staging

      - name: Verify staging API health and smoke tests
        env:
          STAGING_URL: ${{ vars.STAGING_URL }}
          STAGING_API_KEY: ${{ secrets.STAGING_API_KEY }}
        run: |
          python scripts/verify_remote_api.py \
            --base-url "$STAGING_URL" \
            --api-key "$STAGING_API_KEY" \
            --min-capabilities "${{ github.event.inputs.min_capabilities }}"

  production-preflight:
    name: Production Preflight
    needs: provenance
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.git_ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install verification dependencies
        run: pip install requests

      - name: Install Railway CLI
        run: npm install -g @railway/cli@4.58.0

      - name: Check Railway production readiness
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PRODUCTION }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          SERVICE_NAME: ${{ vars.RAILWAY_SERVICE_NAME }}
          PRODUCTION_ENV: ${{ vars.RAILWAY_PRODUCTION_ENVIRONMENT }}
        run: |
          set -euo pipefail
          python scripts/check_railway_readiness.py \
            --environment "$PRODUCTION_ENV" \
            --service "$SERVICE_NAME" \
            --expect-env-value production

      - name: Require production verification inputs
        env:
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          PRODUCTION_API_KEY: ${{ secrets.PRODUCTION_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${PRODUCTION_URL:-}" ] && [ -z "${RAILWAY_PROJECT_ID:-}" ]; then
            echo "::error::Set PRODUCTION_URL, or set RAILWAY_PROJECT_ID so the workflow can resolve a Railway production domain."
            exit 1
          fi
          if [ -z "${PRODUCTION_API_KEY:-}" ]; then
            echo "::error::PRODUCTION_API_KEY is required before deploying Stargate production."
            exit 1
          fi

      - name: Verify current production health before deploy
        if: vars.REQUIRE_CURRENT_PRODUCTION_HEALTH == 'true' && vars.PRODUCTION_URL != ''
        run: |
          response=$(curl -s "${{ vars.PRODUCTION_URL }}/health")
          status=$(python -c 'import json,sys; print(json.loads(sys.argv[1]).get("status",""))' "$response")
          if [ "$status" != "healthy" ]; then
            echo "Production is not healthy before deploy. Aborting."
            exit 1
          fi

  deploy:
    name: Deploy to Railway Production
    needs: [provenance, staging-preflight, production-preflight]
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.git_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install verification dependencies
        run: pip install requests

      - name: Install Railway CLI
        run: npm install -g @railway/cli@4.58.0

      - name: Deploy to Railway production
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PRODUCTION }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          SERVICE_NAME: ${{ vars.RAILWAY_SERVICE_NAME }}
          PRODUCTION_ENV: ${{ vars.RAILWAY_PRODUCTION_ENVIRONMENT }}
          CONFIGURED_PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
        run: |
          set -euo pipefail
          for name in RAILWAY_TOKEN SERVICE_NAME PRODUCTION_ENV; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required for Railway deploys."
              exit 1
            fi
          done
          retry_railway() {
            local attempt
            local status
            local delay=15
            local max_attempts=5
            for attempt in $(seq 1 "$max_attempts"); do
              if railway "$@"; then
                return 0
              else
                status="$?"
              fi
              if [ "$attempt" -eq "$max_attempts" ]; then
                return "$status"
              fi
              echo "Railway command failed on attempt ${attempt}/${max_attempts}; retrying in ${delay}s."
              sleep "$delay"
              delay=$((delay * 2))
            done
          }
          SOURCE_SHA="$(git rev-parse HEAD)"
          BUILD_TIME="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          retry_railway variable set \
            --service "$SERVICE_NAME" \
            --environment "$PRODUCTION_ENV" \
            --skip-deploys \
            "STARGATE_BUILD_SHA=${SOURCE_SHA}" \
            "STARGATE_BUILD_TIME=${BUILD_TIME}" \
            "STARGATE_DEPLOYMENT_ID=${GITHUB_RUN_ID}" \
            "STARGATE_ENVIRONMENT=production" \
            "ENVIRONMENT=production"
          retry_railway up --ci --service "$SERVICE_NAME" --environment "$PRODUCTION_ENV"
          mkdir -p release-proof
          PRODUCTION_URL="${CONFIGURED_PRODUCTION_URL:-}"
          if [ -z "$PRODUCTION_URL" ]; then
            if [ -z "${RAILWAY_PROJECT_ID:-}" ]; then
              echo "::error::Set PRODUCTION_URL, or set RAILWAY_PROJECT_ID so the workflow can resolve a Railway production domain."
              exit 1
            fi
            DOMAIN_OUTPUT="$(retry_railway domain --service "$SERVICE_NAME" --json)"
            printf '%s\n' "$DOMAIN_OUTPUT" > release-proof/railway-production-domain.json
            PRODUCTION_URL="$(node -e 'const raw = process.argv[1] ?? ""; const values = []; function visit(value) { if (typeof value === "string") values.push(value); else if (Array.isArray(value)) value.forEach(visit); else if (value && typeof value === "object") Object.values(value).forEach(visit); } try { visit(JSON.parse(raw)); } catch { values.push(raw); } const match = values.flatMap((value) => value.match(/https?:\/\/[a-z0-9.-]+\.up\.railway\.app\b/gi) ?? []).at(0); if (!match) process.exit(1); console.log(match.replace(/\/$/, ""));' "$DOMAIN_OUTPUT")"
          else
            printf '{"source":"github-env","url":"%s"}\n' "$PRODUCTION_URL" > release-proof/railway-production-domain.json
          fi
          echo "PRODUCTION_URL=${PRODUCTION_URL%/}" >> "$GITHUB_ENV"
          echo "SOURCE_SHA=$SOURCE_SHA" >> "$GITHUB_ENV"
          echo "Resolved Stargate production URL: ${PRODUCTION_URL%/}"

      - name: Verify production API after deploy
        env:
          PRODUCTION_API_KEY: ${{ secrets.PRODUCTION_API_KEY }}
        run: |
          if [ -z "${PRODUCTION_URL:-}" ]; then
            echo "::error::PRODUCTION_URL is required for production verification."
            exit 1
          fi
          for attempt in 1 2 3 4 5; do
            if python scripts/verify_remote_api.py \
              --base-url "$PRODUCTION_URL" \
              --api-key "$PRODUCTION_API_KEY" \
              --expected-sha "$SOURCE_SHA" \
              --min-capabilities "${{ github.event.inputs.min_capabilities }}"; then
              exit 0
            fi
            echo "Production verification attempt $attempt failed, retrying..."
            sleep 15
          done
          echo "Production verification failed after retries"
          exit 1

      - name: Upload deployed production proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stargate-production-deployed-proof-${{ github.run_id }}
          path: release-proof/
          if-no-files-found: ignore
