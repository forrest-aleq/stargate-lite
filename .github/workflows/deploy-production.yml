name: Deploy to Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production deployment'
        required: true

jobs:
  validate:
    name: Pre-deploy Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Confirm manual deployment
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy" ]; then
            echo "Deployment not confirmed"
            exit 1
          fi

      - name: Verify staging is healthy
        run: |
          response=$(curl -s ${{ vars.STAGING_URL }}/health)
          status=$(echo $response | jq -r '.status')
          if [ "$status" != "healthy" ]; then
            echo "Staging not healthy. Deploy to staging first."
            exit 1
          fi

  deploy:
    name: Deploy to Railway Production
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Production
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PRODUCTION }}
        run: railway up --service stargate

      - name: Health check (with retries)
        run: |
          for i in 1 2 3 4 5; do
            response=$(curl -s -o /dev/null -w "%{http_code}" ${{ vars.PRODUCTION_URL }}/health)
            if [ "$response" == "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Smoke tests
        env:
          API_KEY: ${{ secrets.PRODUCTION_API_KEY }}
        run: |
          response=$(curl -s -H "X-API-Key: $API_KEY" ${{ vars.PRODUCTION_URL }}/api/v1/capabilities)
          count=$(echo $response | jq '.count')
          if [ "$count" -lt 500 ]; then
            exit 1
          fi
          echo "Smoke tests passed"
