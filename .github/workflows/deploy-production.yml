name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref to deploy (branch/tag/SHA)"
        required: false
        default: "main"
      confirm:
        description: 'Type "deploy-production" to confirm'
        required: true
      min_capabilities:
        description: "Minimum capabilities expected after deploy"
        required: false
        default: "100"

permissions:
  contents: read
  id-token: write

concurrency:
  group: stargate-production-deploy
  cancel-in-progress: false

jobs:
  provenance:
    name: Release Provenance Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.git_ref }}
          fetch-depth: 0

      - name: Confirm manual deployment
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy-production" ]; then
            echo "Deployment not confirmed"
            exit 1
          fi

      - name: Ensure target ref is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "Target ref is not on main; refusing production deploy"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Release provenance gate
        run: |
          python3 scripts/release_gate.py \
            --mode production \
            --target-ref HEAD \
            --write-proof release-proof/stargate-lite-production.json

  staging-preflight:
    name: Staging Preflight
    needs: provenance
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.git_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install verification dependencies
        run: pip install requests

      - name: Verify staging API health and smoke tests
        env:
          STAGING_URL: ${{ vars.STAGING_URL }}
          STAGING_API_KEY: ${{ secrets.STAGING_API_KEY }}
        run: |
          python scripts/verify_remote_api.py \
            --base-url "$STAGING_URL" \
            --api-key "$STAGING_API_KEY" \
            --min-capabilities "${{ github.event.inputs.min_capabilities }}"

  production-preflight:
    name: Production Preflight
    needs: provenance
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.git_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install verification dependencies
        run: pip install requests

      - name: Verify current production health before deploy
        if: vars.REQUIRE_CURRENT_PRODUCTION_HEALTH == 'true'
        run: |
          response=$(curl -s "${{ vars.PRODUCTION_URL }}/health")
          status=$(python -c 'import json,sys; print(json.loads(sys.argv[1]).get("status",""))' "$response")
          if [ "$status" != "healthy" ]; then
            echo "Production is not healthy before deploy. Aborting."
            exit 1
          fi

  deploy:
    name: Deploy to Cloud Run Production
    needs: [provenance, staging-preflight, production-preflight]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.git_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install verification dependencies
        run: pip install requests

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - id: image
        name: Build and push image
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          REGISTRY_LOCATION: ${{ vars.GCP_ARTIFACT_REGISTRY_LOCATION }}
          REPOSITORY: ${{ vars.GCP_ARTIFACT_REGISTRY_REPOSITORY }}
        run: |
          set -euo pipefail
          for name in PROJECT_ID REGISTRY_LOCATION REPOSITORY; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required for Cloud Run deploys."
              exit 1
            fi
          done
          SOURCE_SHA="$(git rev-parse HEAD)"
          REGISTRY_HOST="${REGISTRY_LOCATION}-docker.pkg.dev"
          IMAGE_URI="${REGISTRY_HOST}/${PROJECT_ID}/${REPOSITORY}/stargate-lite:${SOURCE_SHA}"
          gcloud auth configure-docker "$REGISTRY_HOST" --quiet
          docker build --tag "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"
          echo "source_sha=$SOURCE_SHA" >> "$GITHUB_OUTPUT"

      - name: Deploy to Production
        env:
          IMAGE_URI: ${{ steps.image.outputs.image_uri }}
          SOURCE_SHA: ${{ steps.image.outputs.source_sha }}
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          REGION: ${{ vars.GCP_REGION }}
          SERVICE_NAME: ${{ vars.GCP_CLOUD_RUN_SERVICE }}
          EXTRA_ENV_VARS: ${{ vars.GCP_CLOUD_RUN_ENV_VARS }}
          SECRET_MAPPINGS: ${{ vars.GCP_CLOUD_RUN_SECRETS }}
        run: |
          set -euo pipefail
          for name in IMAGE_URI SOURCE_SHA PROJECT_ID REGION SERVICE_NAME SECRET_MAPPINGS; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required for Cloud Run deploys."
              exit 1
            fi
          done
          BUILD_TIME="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          RUNTIME_ENV="STARGATE_BUILD_SHA=${SOURCE_SHA},STARGATE_BUILD_TIME=${BUILD_TIME},STARGATE_DEPLOYMENT_ID=${GITHUB_RUN_ID},STARGATE_ENVIRONMENT=production,ENVIRONMENT=production"
          if [ -n "${EXTRA_ENV_VARS:-}" ]; then
            RUNTIME_ENV="${RUNTIME_ENV},${EXTRA_ENV_VARS}"
          fi
          gcloud run deploy "$SERVICE_NAME" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --platform managed \
            --image "$IMAGE_URI" \
            --allow-unauthenticated \
            --update-env-vars "$RUNTIME_ENV" \
            --set-secrets "$SECRET_MAPPINGS" \
            --quiet

      - name: Verify production API after deploy (with retries)
        env:
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
          PRODUCTION_API_KEY: ${{ secrets.PRODUCTION_API_KEY }}
          SOURCE_SHA: ${{ steps.image.outputs.source_sha }}
        run: |
          for attempt in 1 2 3 4 5; do
            if python scripts/verify_remote_api.py \
              --base-url "$PRODUCTION_URL" \
              --api-key "$PRODUCTION_API_KEY" \
              --expected-sha "$SOURCE_SHA" \
              --min-capabilities "${{ github.event.inputs.min_capabilities }}"; then
              exit 0
            fi
            echo "Production verification attempt $attempt failed, retrying..."
            sleep 15
          done
          echo "Production verification failed after retries"
          exit 1
